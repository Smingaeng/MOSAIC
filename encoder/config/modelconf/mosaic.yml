optimizer:
  name: adam
  lr: 1.0e-3
  weight_decay: 0

train:
  epoch: 3000
  batch_size: 4096
  save_model: true
  loss: pairwise
  test_step: 3
  reproducible: true
  seed: 2023
  patience: 20
  show_progress: false

test:
  metrics: [recall, ndcg]
  k: [5, 10, 20]
  batch_size: 8192

data:
  type: general_cf
  name: amazon_book

model:
  name: mosaic

  top_k: 2
  gate_hidden_size: 128

  layer_modulation_scale: 0.5
  layer_modulation_lambda_init: 1.0e-2
  layer_modulation_init_std: 1.0e-3

  keep_rate: 1.0
  embedding_size: 64
  layer_num: 3
  reg_weight: 1.0e-6
  balance_loss_weight: 0.0

  llm_embedding_device: model

  amazon_book:
    layer_num: 3
    reg_weight: 1.0e-6
    balance_loss_weight: 1.0e-3
    layer_modulation_scale: 1.0
    top_k: 2
    llm_align_temperature: 0.20
    intent_align_weight: 5.0e-4

  yelp:
    layer_num: 2
    reg_weight: 1.0e-6
    balance_loss_weight: 5.0e-4
    layer_modulation_scale: 1.0
    layer_modulation_lambda_init: 5.0e-2
    layer_modulation_init_std: 1.0e-2
    llm_align_temperature: 0.20
    intent_align_weight: 5.0e-3
    top_k: 2

  amazon_movie:
    layer_num: 3
    reg_weight: 1.0e-6
    balance_loss_weight: 0.0
    layer_modulation_scale: 1.0
    top_k: 2
    llm_align_temperature: 0.20
    intent_align_weight: 5.0e-3
