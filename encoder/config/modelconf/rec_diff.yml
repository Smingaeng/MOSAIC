optimizer:
  name: adam
  lr: 5.0e-3
  weight_decay: 0

train:
  epoch: 150
  batch_size: 2048
  save_model: true
  loss: pairwise
  log_loss: true
  test_step: 5
  reproducible: true
  seed: 2023
  patience: 20
  show_progress: true

test:
  metrics: [recall, ndcg]
  k: [5, 10, 20]
  batch_size: 1024

data:
  type: general_cf
  name: epnions

model:
  name: rec_diff

  embedding_size: 64
  layer_num: 2         
  social_layer_num: 2   
  weight: true          
  keep_rate: 1.0       
  diff_lr: 1.0e-3      
  reg_weight: 1.0e-2    
  diff_loss_weight: 1.0

  dropout: 0.0
  time_type: cat
  dims: 64
  norm: true
  emb_size: 16

  steps: 20
  noise_schedule: linear-var
  noise_scale: 1.0
  noise_min: 1.0e-4
  noise_max: 1.0e-2
  sampling_noise: false
  sampling_steps: 0
  reweight: true

  social_graph_path: null
  social_graph_candidates:
    - user_edges.pkl
    - trust.pkl
    - trust_mat.pkl
    - social.pkl
    - social_mat.pkl
    - social_edges.pkl
    - uu_graph.pkl
    - uu_mat.pkl
    - user_graph.pkl
  social_graph_undirected: false
  add_social_self_loop: false
  require_social_graph: false
  social_graph_fallback: identity
  fallback_max_social_neighbors: 0

  yelp:
    reg_weight: 1.0e-2
    layer_num: 2
    social_layer_num: 2

  amazon_book:
    reg_weight: 1.0e-2
    layer_num: 2
    social_layer_num: 2

  amazon_movie:
    reg_weight: 1.0e-2
    layer_num: 2
    social_layer_num: 2
